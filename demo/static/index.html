<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support AI — Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f14;
      --surface: #1a1a24;
      --surface-2: #24243a;
      --border: #2a2a40;
      --text: #e4e4f0;
      --text-dim: #8888a8;
      --accent: #6c5ce7;
      --accent-light: #a29bfe;
      --green: #00d68f;
      --orange: #fdcb6e;
      --red: #ff6b6b;
      --blue: #74b9ff;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      background: linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .header-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .header-text h1 {
      font-size: 18px; font-weight: 700;
      background: linear-gradient(135deg, var(--text), var(--accent-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .header-text p { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

    .lang-toggle {
      margin-left: auto;
      display: flex;
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 3px;
      border: 1px solid var(--border);
    }

    .lang-btn {
      padding: 6px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: var(--text-dim);
      font-family: inherit;
    }

    .lang-btn.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 2px 8px rgba(108, 92, 231, 0.4);
    }

    /* ── Chat area ──────────────────────────── */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .chat-container::-webkit-scrollbar { width: 6px; }
    .chat-container::-webkit-scrollbar-track { background: transparent; }
    .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: msgIn 0.3s ease-out;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot { align-self: flex-start; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .msg.user .msg-avatar { background: var(--surface-2); }
    .msg.bot .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent-light)); }

    .msg-content {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
    }

    .msg.user .msg-bubble {
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg.bot .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* ── Tag badge (shown under bot message) ── */
    .msg-meta {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      padding: 0 4px;
    }

    .tag-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .tag-badge.answer { background: rgba(0, 214, 143, 0.15); color: var(--green); }
    .tag-badge.support { background: rgba(253, 203, 110, 0.15); color: var(--orange); }
    .tag-badge.reject { background: rgba(255, 107, 107, 0.15); color: var(--red); }

    .conf-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--surface-2);
      color: var(--text-dim);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .conf-badge.high { color: var(--green); background: rgba(0, 214, 143, 0.1); }
    .conf-badge.mid { color: var(--orange); background: rgba(253, 203, 110, 0.1); }
    .conf-badge.low { color: var(--red); background: rgba(255, 107, 107, 0.1); }

    .latency-badge {
      font-size: 10px;
      color: var(--text-dim);
      opacity: 0.6;
    }

    /* ── Typing indicator ───────────────────── */
    .typing { display: none; }
    .typing.show { display: flex; }

    .typing-dots {
      display: flex; gap: 4px; padding: 12px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); border-bottom-left-radius: 4px;
    }

    .typing-dots span {
      width: 7px; height: 7px;
      background: var(--text-dim);
      border-radius: 50%;
      animation: dotPulse 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes dotPulse {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
      30% { opacity: 1; transform: scale(1); }
    }

    /* ── Input area ─────────────────────────── */
    .input-area {
      padding: 16px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrap {
      display: flex;
      gap: 10px;
      max-width: 800px;
      margin: 0 auto;
    }

    .input-wrap input {
      flex: 1;
      padding: 14px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-wrap input:focus { border-color: var(--accent); }

    .input-wrap input::placeholder { color: var(--text-dim); }

    .send-btn {
      padding: 14px 24px;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.15s, box-shadow 0.2s;
    }

    .send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(108, 92, 231, 0.4);
    }

    .send-btn:active { transform: scale(0.97); }

    /* ── Quick actions ──────────────────────── */
    .quick-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    .quick-btn {
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .quick-btn:hover {
      border-color: var(--accent);
      color: var(--accent-light);
      background: rgba(108, 92, 231, 0.08);
    }

    /* ── Welcome screen ─────────────────────── */
    .welcome {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }

    .welcome-icon { font-size: 48px; margin-bottom: 16px; }
    .welcome h2 { font-size: 22px; color: var(--text); margin-bottom: 8px; }
    .welcome p { font-size: 14px; line-height: 1.6; max-width: 400px; margin: 0 auto; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">🤖</div>
    <div class="header-text">
      <h1>Support AI Demo</h1>
      <p>intfloat/multilingual-e5-small • TFLite • 8 tags</p>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="ja" onclick="setLang('ja')">JA</button>
    </div>
  </div>

  <!-- Chat messages -->
  <div class="chat-container" id="chat">
    <div class="welcome">
      <div class="welcome-icon">💬</div>
      <h2>Try the Support AI</h2>
      <p>Type a customer support question in English or Japanese.<br>The model will classify it and return the appropriate response.</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrap">
      <input type="text" id="input" placeholder="Type a message..." autocomplete="off" />
      <button class="send-btn" onclick="send()">Send</button>
    </div>
    <div class="quick-actions" id="quickActions"></div>
  </div>

  <script>
    let lang = 'en';
    let welcomeShown = true;

    const quickSamples = {
      en: [
        'How do I reset my password?',
        'Cancel my subscription',
        'The app keeps crashing',
        "Why was I charged twice?",
        'How do I enable dark mode?',
        'I need to talk to a real person',
        "What's the weather today?",
        'hello',
      ],
      ja: [
        'パスワードを変更したい',
        '解約したい',
        'アプリがフリーズする',
        '二重に請求されたのはなぜ？',
        'ダークモードの使い方',
        '人間のスタッフと話したい',
        '今日の天気は？',
        'こんにちは',
      ],
    };

    function setLang(l) {
      lang = l;
      document.querySelectorAll('.lang-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === l);
      });
      document.getElementById('input').placeholder =
        l === 'ja' ? 'メッセージを入力...' : 'Type a message...';
      renderQuickActions();
    }

    function renderQuickActions() {
      const el = document.getElementById('quickActions');
      el.innerHTML = quickSamples[lang]
        .map(q => `<button class="quick-btn" onclick="quickSend('${q.replace(/'/g, "\\'")}')">${q}</button>`)
        .join('');
    }

    function addMsg(text, role, meta) {
      if (welcomeShown) {
        document.querySelector('.welcome')?.remove();
        welcomeShown = false;
      }

      const chat = document.getElementById('chat');
      const div = document.createElement('div');
      div.className = `msg ${role}`;

      let metaHTML = '';
      if (meta) {
        const confClass = meta.confidence >= 0.7 ? 'high' : meta.confidence >= 0.4 ? 'mid' : 'low';
        metaHTML = `
          <div class="msg-meta">
            <span class="tag-badge ${meta.type}">${meta.tag}</span>
            <span class="conf-badge ${confClass}">${(meta.confidence * 100).toFixed(1)}%</span>
            ${meta.raw_tag && meta.raw_tag !== meta.tag ? `<span class="conf-badge low">raw: ${meta.raw_tag}</span>` : ''}
            ${meta.latency ? `<span class="latency-badge">${meta.latency}ms</span>` : ''}
          </div>`;
      }

      div.innerHTML = `
        <div class="msg-avatar">${role === 'user' ? '👤' : '🤖'}</div>
        <div class="msg-content">
          <div class="msg-bubble">${text}</div>
          ${metaHTML}
        </div>`;

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function showTyping(show) {
      let el = document.getElementById('typing');
      if (!el && show) {
        const chat = document.getElementById('chat');
        el = document.createElement('div');
        el.id = 'typing';
        el.className = 'msg bot typing show';
        el.innerHTML = `
          <div class="msg-avatar">🤖</div>
          <div class="typing-dots"><span></span><span></span><span></span></div>`;
        chat.appendChild(el);
        chat.scrollTop = chat.scrollHeight;
      } else if (el && !show) {
        el.remove();
      }
    }

    async function send() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      addMsg(text, 'user');
      showTyping(true);

      const t0 = performance.now();
      try {
        const res = await fetch('/api/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, lang }),
        });
        const data = await res.json();
        const latency = Math.round(performance.now() - t0);

        showTyping(false);
        addMsg((data.response || 'No response configured for this tag.').replace(/\n/g, '<br>'), 'bot', {
          tag: data.tag,
          raw_tag: data.raw_tag,
          type: data.type,
          confidence: data.confidence,
          latency,
        });
      } catch (err) {
        showTyping(false);
        addMsg('⚠️ Server error. Make sure the backend is running.', 'bot');
      }
    }

    function quickSend(text) {
      document.getElementById('input').value = text;
      send();
    }

    // Enter to send
    document.getElementById('input').addEventListener('keydown', e => {
      if (e.key === 'Enter') send();
    });

    // Init
    renderQuickActions();
    document.getElementById('input').focus();
  </script>
</body>
</html>
